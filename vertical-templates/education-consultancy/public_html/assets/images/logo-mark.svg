<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 210" width="250" height="210">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c574"/><stop offset=".5" stop-color="#c99a3f"/><stop offset="1" stop-color="#a5761f"/>
    </linearGradient>
  </defs>
  <!-- left navy serif column -->
  <g fill="#16315f">
    <rect x="34" y="52" width="24" height="104"/>
    <rect x="20" y="46" width="52" height="12" rx="2"/>
    <rect x="20" y="150" width="52" height="12" rx="2"/>
    <!-- right navy serif column (upper) -->
    <rect x="150" y="52" width="24" height="70"/>
    <rect x="136" y="46" width="52" height="12" rx="2"/>
  </g>
  <!-- gold rising bars -->
  <g fill="url(#gold)">
    <rect x="70" y="104" width="13" height="34" rx="1.5"/>
    <rect x="87" y="90"  width="13" height="48" rx="1.5"/>
    <rect x="104" y="76" width="13" height="62" rx="1.5"/>
    <rect x="121" y="62" width="13" height="76" rx="1.5"/>
  </g>
  <!-- navy growth swoosh with arrow -->
  <path d="M40 158 C 95 156, 165 150, 205 82" fill="none" stroke="#16315f" stroke-width="15" stroke-linecap="round"/>
  <path d="M203 74 l-16 10 l18 12 z" fill="#16315f"/>
  <!-- gold C -->
  <path d="M206 84 A 50 50 0 1 0 206 152" fill="none" stroke="url(#gold)" stroke-width="26" stroke-linecap="round"/>
</svg>
